# mojizo firmware bring-up profile
#
# Goals at this stage:
#   1. Board boots
#   2. USB CDC ACM provides /dev/ttyACM0 console
#   3. Green LED blinks
#   4. printk / LOG_INF reaches host

# --- Logging --------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_LOG_MODE_OVERFLOW=y

# --- USB CDC ACM (console) ------------------------------------------------
# Console routed to usb_cdc_acm_uart by xiao_ble_common.dtsi via
# zephyr,console = &usb_cdc_acm_uart.
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="mojizo"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0008
# Enlarge CDC TX ring so early-boot log burst doesn't fill it before host
# enumerates and reads. Default in NCS v2.7 is 1024.
CONFIG_USB_CDC_ACM_RINGBUF_SIZE=8192
# Don't auto-init: we call usb_enable() from main after waiting for DTR
# so output isn't lost.
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n

# --- Reboot + power-off (deep sleep) --------------------------------------
CONFIG_REBOOT=y
# sys_poweroff() -> nRF System OFF for deep sleep; wakes (resets) on the
# button's GPIO sense. ~uA standby.
CONFIG_POWEROFF=y

# --- GPIO -----------------------------------------------------------------
CONFIG_GPIO=y

# --- ADC (battery voltage sense on AIN7 / P0.31) --------------------------
CONFIG_ADC=y

# --- Power management (XIAO BLE Sense onboard QSPI flash uses pm_device) --
CONFIG_PM_DEVICE=y
# Onboard P25Q16H QSPI flash: compile the driver so we can put the chip into
# deep-power-down at boot (main.c). Unused on this product (we store to SD),
# and it draws standby current if left running. ~mA saving.
# NORDIC_QSPI_NOR depends on the flash subsystem, hence CONFIG_FLASH=y.
CONFIG_FLASH=y
CONFIG_NORDIC_QSPI_NOR=y
CONFIG_NORDIC_QSPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096

# --- Hardware watchdog ----------------------------------------------------
# nRF WDT armed in main(); fed in the main loop. If firmware hangs (the radio
# stops, console dies) the WDT resets the board instead of draining the
# battery flat with the radio stuck on. (omi has this; we previously didn't.)
CONFIG_WATCHDOG=y

# --- printk for early bring-up via printf ---------------------------------
CONFIG_PRINTK=y

# --- PDM microphone + Opus ------------------------------------------------
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y
CONFIG_REGULATOR=y

# --- SD card / SPI / FATFS ------------------------------------------------
# DT overlay (boards/...overlay) wires SPI SD on spi2 with sdhc-spi-slot +
# sdmmc-disk; we just need the subsystems compiled in.
CONFIG_SPI=y
CONFIG_SDHC=y
CONFIG_SPI_SDHC=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_SDMMC_VOLUME_NAME="SD"
CONFIG_SD_INIT_TIMEOUT=5000
CONFIG_SD_RETRY_COUNT=20
CONFIG_SD_CMD_TIMEOUT=500
CONFIG_SD_CMD_RETRIES=5

CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_MKFS=y
CONFIG_FS_FATFS_MOUNT_MKFS=n
# 128GB SDXC ships exFAT by default — Zephyr's FATFS can mount it when
# CONFIG_FS_FATFS_EXFAT=y is set. Without this, fs_mount returns
# FR_NO_FILESYSTEM on exFAT cards.
CONFIG_FS_FATFS_EXFAT=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_LFN_MODE_STACK=y
CONFIG_FS_FATFS_MAX_LFN=255
CONFIG_FS_FATFS_REENTRANT=y

# Quiet noisy SD/SDHC debug to WRN — DBG floods the CDC ring on every
# command and starves the log thread within seconds of boot.
CONFIG_SDMMC_LOG_LEVEL_WRN=y
CONFIG_SDHC_LOG_LEVEL_WRN=y
CONFIG_DISK_LOG_LEVEL_WRN=y
CONFIG_SD_LOG_LEVEL_WRN=y

# --- Bluetooth peripheral -------------------------------------------------
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="mojizo"
CONFIG_BT_DEVICE_APPEARANCE=833

# Secure Connections pairing — Windows / Android centrals require this
# during establishment; without it the link tears down at LE Connection
# Complete on most modern hosts.
CONFIG_BT_SMP=y

# Battery + Device Information services (built-in Zephyr GATT services).
CONFIG_BT_BAS=y
CONFIG_BT_DIS=y
CONFIG_BT_DIS_PNP=n
CONFIG_BT_DIS_MANUF="voice-recorder"
CONFIG_BT_DIS_MODEL="xiao-ble-sense"
CONFIG_BT_DIS_FW_REV=y
CONFIG_BT_DIS_FW_REV_STR="0.1.0"

# Larger MTU and ATT TX buffers so audio notifications can carry
# substantial Opus chunks without segmentation overhead.
CONFIG_BT_BUF_ACL_RX_SIZE=251
# TX side too (was missing): without a large ACL TX buffer + controller max
# data length, every notification fragments into 27-byte link packets — the
# real storage-fetch throughput bottleneck. Set both so DLE actually carries
# full ~244-byte payloads per packet.
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
# More ACL TX buffers => more packets queued per connection event => higher
# storage-fetch throughput (pairs with the deeper notify pipeline).
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_GATT_AUTO_UPDATE_MTU=y
CONFIG_BT_ATT_TX_COUNT=20
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y

# Peripheral preferred connection params: 7.5 ms / 15 ms / 6 s timeout.
# These match what the omi-fork investigation converged on.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600

# Auto Data Length Extension ON (throughput): without DLE a 244-byte ATT
# payload fragments into ~9 × 27-byte link packets, throttling storage-fetch to
# ~12 KB/s. Auto-DLE lets the link carry the full payload per packet (~3-5x).
# PHY auto stays OFF — the old "333 ms drop at establishment" was traced to the
# PHY-update path, and 2M PHY gave no measured gain here, so we leave it manual.
CONFIG_BT_USER_PHY_UPDATE=y
CONFIG_BT_AUTO_PHY_UPDATE=n
CONFIG_BT_AUTO_DATA_LEN_UPDATE=y
